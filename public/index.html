<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Bot Manager</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; height: 100vh; margin: 0; background: #1e1e1e; color: #fff; }
        #sidebar { width: 320px; background: #2d2d2d; display: flex; flex-direction: column; border-right: 1px solid #444; }
        #setup-panel { padding: 15px; border-bottom: 2px solid #555; background: #252525; }
        #bot-list-container { flex: 1; overflow-y: auto; }
        
        #main { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        
        .bot-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        .bot-item:hover { background: #3d3d3d; }
        .bot-item.active { background: #005A9C; }
        
        .status { width: 12px; height: 12px; border-radius: 50%; }
        .status.offline { background: #ff4d4d; box-shadow: 0 0 5px #ff4d4d; }
        .status.connecting { background: #ffcc00; box-shadow: 0 0 5px #ffcc00;}
        .status.online { background: #4caf50; box-shadow: 0 0 5px #4caf50;}
        
        .btn { padding: 8px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-start { background: #4caf50; }
        .btn-stop { background: #ff4d4d; }
        .btn-blue { background: #007acc; width: 100%; margin-top: 10px; }
        
        .header-controls { margin-bottom: 20px; padding: 15px; background: #2d2d2d; border-radius: 8px; }
        #bot-detail { display: none; background: #2d2d2d; padding: 20px; border-radius: 8px; flex: 1; display: flex; flex-direction: column;}
        #chat-log { flex: 1; background: #111; padding: 10px; overflow-y: auto; font-family: monospace; margin-bottom: 10px; border-radius: 4px; }
        
        input, textarea { width: 100%; box-sizing: border-box; padding: 8px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; margin-bottom: 5px; }
        .flex-row { display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="setup-panel">
            <h3 style="margin-top: 0;">🛠️ Nạp Account</h3>
            <textarea id="raw-accounts" rows="4" placeholder="Nhập danh sách account...&#10;Mỗi account 1 dòng"></textarea>
            
            <div style="font-size: 12px; margin: 5px 0;">Hoặc tạo nhanh tự động:</div>
            <div class="flex-row">
                <input type="text" id="prefix" placeholder="Prefix (VD: hutaomcrac)">
                <input type="number" id="amount" placeholder="Số lượng" style="width: 80px;">
                <button class="btn btn-start" onclick="generateAccounts()">Tạo</button>
            </div>
            
            <button class="btn btn-blue" onclick="submitAccounts()">Lưu & Hiển thị danh sách</button>
        </div>

        <div id="bot-list-container"></div>
    </div>

    <div id="main">
        <div class="header-controls">
            <button class="btn btn-start" onclick="socket.emit('startAll')">🚀 Khởi động tất cả (Theo Delay)</button>
            <button class="btn btn-stop" onclick="socket.emit('stopAll')">🛑 Ngắt kết nối tất cả</button>
        </div>

        <div id="bot-detail" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 id="current-bot-name" style="margin: 0;">Chưa chọn bot</h2>
                <button class="btn btn-start" id="toggle-current-btn" onclick="toggleCurrentBot()">Bật / Tắt Bot Này</button>
            </div>
            
            <div id="chat-log"></div>
            
            <div class="flex-row">
                <input type="text" id="chat-input" placeholder="Nhập lệnh hoặc tin nhắn (VD: /rtp, /spawn)...">
                <button class="btn btn-blue" style="width: 100px; margin-top: 0;" onclick="sendChat()">Gửi</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentSelectedBot = null;
        let botStatuses = {};

        // --- CÁC HÀM XỬ LÝ ACCOUNT ---
        function generateAccounts() {
            const prefix = document.getElementById('prefix').value.trim();
            const amount = parseInt(document.getElementById('amount').value);
            if (!prefix || !amount || amount <= 0) return alert('Vui lòng nhập Prefix và Số lượng hợp lệ!');
            
            let generated = [];
            for (let i = 1; i <= amount; i++) {
                // Thêm số 0 ở trước nếu i < 10 (VD: 01, 02)
                let num = String(i).padStart(2, '0');
                generated.push(`${prefix}${num}`);
            }
            
            // Đưa vào textarea
            const textarea = document.getElementById('raw-accounts');
            const currentVal = textarea.value.trim();
            textarea.value = currentVal ? currentVal + '\n' + generated.join('\n') : generated.join('\n');
        }

        function submitAccounts() {
            const raw = document.getElementById('raw-accounts').value;
            const accounts = raw.split('\n').map(acc => acc.trim()).filter(acc => acc !== '');
            if (accounts.length === 0) return alert('Danh sách trống!');
            
            socket.emit('setAccounts', accounts);
            document.getElementById('raw-accounts').value = ''; // Xoá form sau khi gửi
        }

        // --- CÁC HÀM XỬ LÝ SOCKET & UI ---
        socket.on('init', (bots) => {
            const container = document.getElementById('bot-list-container');
            container.innerHTML = '<div style="padding: 10px 15px; color: #aaa; border-bottom: 1px solid #444;">Danh sách Bot quản lý:</div>';
            
            bots.forEach(bot => {
                botStatuses[bot.username] = bot.status;
                container.innerHTML += `
                    <div class="bot-item ${currentSelectedBot === bot.username ? 'active' : ''}" id="item-${bot.username}" onclick="selectBot('${bot.username}')">
                        <span>${bot.username}</span>
                        <div class="status ${bot.status}" id="status-${bot.username}"></div>
                    </div>
                `;
            });
        });

        socket.on('botStatus', (data) => {
            botStatuses[data.username] = data.status;
            const statusDiv = document.getElementById(`status-${data.username}`);
            if (statusDiv) statusDiv.className = `status ${data.status}`;
        });

        socket.on('botChat', (data) => {
            if (currentSelectedBot === data.username) {
                const log = document.getElementById('chat-log');
                log.innerHTML += `<div>${data.message}</div>`;
                log.scrollTop = log.scrollHeight;
            }
        });

        function selectBot(username) {
            currentSelectedBot = username;
            document.querySelectorAll('.bot-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`item-${username}`).classList.add('active');
            
            document.getElementById('bot-detail').style.display = 'flex';
            document.getElementById('current-bot-name').innerText = `🤖 Tab Điều Khiển: ${username}`;
            document.getElementById('chat-log').innerHTML = ''; 
        }

        function toggleCurrentBot() {
            if (currentSelectedBot) socket.emit('toggleBot', currentSelectedBot);
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if (currentSelectedBot && input.value) {
                socket.emit('sendChat', { username: currentSelectedBot, message: input.value });
                input.value = '';
            }
        }

        // Enter để gửi chat
        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendChat();
        });
    </script>
</body>
</html>
